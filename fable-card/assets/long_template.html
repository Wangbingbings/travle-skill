<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: {{BG_COLOR}};
    --text: #1D1D1F;
    --text-mid: #6E6E73;
    --text-dim: #ACACB0;
    --accent: {{ACCENT_COLOR}};
    --rule: #E5E5EA;
    --font: 'KingHwa_OldSong', 'PingFang SC', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    background: var(--bg);
  }

  .card {
    width: 1080px;
    background: var(--bg);
    padding: 64px 72px 52px;
    display: flex;
    flex-direction: column;
  }

  /* ── Title ── */
  .title-area {
    flex-shrink: 0;
    margin-bottom: 52px;
  }

  .title-area h1 {
    font: 700 84px/1.15 var(--font);
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 22px;
  }

  .title-area::after {
    content: '';
    display: block;
    width: 52px;
    height: 3px;
    background: var(--accent);
  }

  /* ── Content ── */
  .content {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .content p {
    font: 400 36px/1.7 var(--font);
    color: var(--text);
    margin-bottom: 28px;
  }

  .content .highlight {
    font: 500 40px/1.55 var(--font);
    color: var(--text);
    padding: 14px 0 14px 26px;
    border-left: 3px solid var(--accent);
    margin: 36px 0;
  }

  .content .prompt {
    font: 500 38px/1.55 var(--font);
    color: #1D3A1D;
    background: #E8F1E0;
    padding: 24px 30px 24px 36px;
    border-left: 4px solid #5A8B5A;
    margin: 32px 0;
    letter-spacing: -0.01em;
  }

  .content .prompt strong {
    color: #1D3A1D;
  }

  .content h2 {
    font: 600 42px/1.4 var(--font);
    color: var(--text);
    margin: 44px 0 22px;
    letter-spacing: -0.02em;
  }

  .content h2:first-child {
    margin-top: 0;
  }

  .content .subtitle {
    font: 400 22px/2 var(--font);
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .content .item {
    margin-bottom: 36px;
  }

  .content .item:last-child {
    margin-bottom: 0;
  }

  .content .item .label {
    font: 500 36px/1.5 var(--font);
    color: var(--text);
    margin-bottom: 6px;
  }

  .content .item p {
    font: 400 32px/1.65 var(--font);
    color: var(--text-mid);
    margin-bottom: 0;
  }

  .content blockquote {
    margin: 0 0 28px;
    padding-left: 26px;
    border-left: 3px solid var(--rule);
  }

  .content blockquote p {
    font: 300 36px/1.7 var(--font);
    color: var(--text-mid);
    margin-bottom: 6px;
  }

  .content strong {
    font-weight: 600;
    color: var(--text);
  }

  .content .divider {
    height: 1px;
    background: var(--rule);
    margin: 36px 0;
  }

  .content ul {
    list-style: none;
    margin-bottom: 28px;
  }

  .content ul li {
    font: 400 36px/1.7 var(--font);
    color: var(--text);
    padding: 4px 0 4px 28px;
    position: relative;
  }

  .content ul li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--text-mid);
  }

  /* ── Drop Cap ── */
  .content .dropcap::first-letter {
    font: 700 128px/0.82 'KingHwa_OldSong', Georgia, serif;
    float: left;
    margin: 4px 16px 0 -4px;
    color: var(--accent);
  }

  /* ── End Mark ── */
  .content::after {
    content: '∎';
    display: block;
    text-align: right;
    font-size: 16px;
    color: var(--accent);
    opacity: 0.4;
    margin-top: 40px;
  }

  .info-source {
    font: 400 22px/1.5 'Menlo', 'SF Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  /* ── Route Card (路线速查) ── */
  .route-section {
    margin-bottom: 48px;
  }

  .route-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--accent);
  }

  .route-header h2 {
    font: 600 42px/1.3 var(--font);
    color: var(--text);
    margin: 0;
    letter-spacing: -0.02em;
  }

  .route-header .route-time {
    font: 500 24px/1 var(--font);
    color: #fff;
    background: var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .zone {
    margin-bottom: 24px;
    padding: 20px 24px;
    background: rgba(0,0,0,0.02);
    border-radius: 12px;
  }

  .zone-name {
    font: 500 26px/1.4 var(--font);
    color: var(--text-mid);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .stop {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
    padding: 12px 0;
  }

  .stop:last-child {
    margin-bottom: 0;
  }

  .stop-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-top: 2px;
  }

  .stop-body {
    flex: 1;
    min-width: 0;
  }

  .stop-name {
    font: 500 32px/1.4 var(--font);
    color: var(--text);
    margin-bottom: 4px;
  }

  .stop-time {
    display: inline-block;
    font: 500 20px/1 var(--font);
    color: var(--accent);
    background: rgba(0,0,0,0.04);
    padding: 4px 10px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .stop-detail {
    font: 400 28px/1.5 var(--font);
    color: var(--text-mid);
  }

  .transport-block {
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    font: 400 28px/1.5 var(--font);
  }

  .transport-block strong {
    color: #fff;
    font-weight: 600;
  }

  /* ── Trip Route Card (Day-based, for fable-travel) ── */

  .trip-card {
    margin-bottom: 32px;
  }

  /* Trip info bar */
  .trip-info {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    margin-bottom: 36px;
    padding: 16px 22px;
    background: rgba(0,0,0,0.03);
    border-radius: 10px;
    font: 400 24px/1.5 var(--font);
    color: var(--text-mid);
  }

  .trip-info-sep {
    margin: 0 12px;
    color: var(--text-dim);
  }

  /* Day block */
  .day-block {
    margin-bottom: 44px;
  }

  .day-block:last-child {
    margin-bottom: 0;
  }

  .day-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 3px solid var(--accent);
  }

  .day-num {
    font: 700 32px/1.2 var(--font);
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .day-title {
    font: 600 38px/1.2 var(--font);
    color: var(--text);
    letter-spacing: -0.02em;
  }

  /* Period block (morning/afternoon/evening) */
  .period-block {
    margin-bottom: 32px;
    padding: 20px 24px;
    background: rgba(0,0,0,0.02);
    border-radius: 12px;
    border-left: 3px solid var(--accent);
  }

  .period-block:last-child {
    margin-bottom: 0;
  }

  .period-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--rule);
  }

  .period-icon {
    font-size: 24px;
    line-height: 1;
  }

  .period-name {
    font: 500 30px/1.3 var(--font);
    color: var(--text);
  }

  .period-duration {
    font: 400 22px/1.3 var(--font);
    color: var(--text-mid);
    margin-left: auto;
  }

  /* Individual trip stop */
  .trip-stop {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 18px;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }

  .trip-stop:last-child {
    margin-bottom: 0;
    border-bottom: none;
  }

  .trip-stop-pin {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    line-height: 1;
    margin-top: 2px;
  }

  .trip-stop-body {
    flex: 1;
    min-width: 0;
  }

  .trip-stop-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .trip-stop-name {
    font: 500 32px/1.4 var(--font);
    color: var(--text);
  }

  .trip-stop-time {
    display: inline-block;
    font: 400 20px/1 'SF Mono', 'Menlo', monospace;
    color: var(--text);
    background: rgba(0,0,0,0.05);
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }

  /* Priority tags */
  .trip-stop-priority {
    display: inline-block;
    font: 400 22px/1 var(--font);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 4px;
  }

  .priority-must {
    color: #B84A2C;
    background: rgba(184,74,44,0.08);
  }

  .priority-optional {
    color: var(--text-mid);
    background: rgba(0,0,0,0.04);
  }

  .priority-rest {
    color: #B8860B;
    background: rgba(184,134,11,0.08);
  }

  .priority-special {
    color: #8B5E3C;
    background: rgba(139,94,60,0.08);
  }

  /* Action & transit */
  .trip-stop-action {
    font: 400 28px/1.55 var(--font);
    color: var(--text-mid);
    margin-bottom: 4px;
  }

  .trip-stop-transit {
    font: 400 24px/1.5 var(--font);
    color: var(--text-dim);
    padding-left: 4px;
  }

  /* Warning */
  .trip-stop-warning {
    display: inline-block;
    font-size: 22px;
    line-height: 1;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Meal recommendation */
  .meal-rec {
    margin-top: 20px;
    padding: 16px 22px;
    background: rgba(184,74,44,0.06);
    border-radius: 10px;
    border: 1px solid rgba(184,74,44,0.12);
    font: 400 28px/1.5 var(--font);
    color: var(--text);
  }

  .meal-rec-icon {
    margin-right: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    {{TITLE_BLOCK}}
    <div class="content">
      {{BODY_HTML}}
    </div>
    <div style="flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;margin-top:52px;padding-top:22px;border-top:1px solid var(--rule);">
      {{SOURCE_LINE}}
    </div>
  </div>
</body>
</html>
